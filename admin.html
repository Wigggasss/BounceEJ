<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bounce EJ | Admin Command</title>
    <style>
        :root {
            --ej-blue: #42a6e8;
            --ej-dark: #1760a6;
            --ej-red: #ef5a5a;
            --ej-green: #97d64a;
        }
        body { 
            background-color: var(--ej-blue);
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .admin-card {
            background: white;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 20px;
            width: 350px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            position: relative;
        }
        .card-tab {
            position: absolute; top: -15px; left: 20px;
            background: #000; color: white;
            padding: 5px 15px; border-radius: 8px;
            font-weight: bold; font-size: 14px;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 12px; }
        input {
            width: 100%; padding: 10px; border: 3px solid #000;
            border-radius: 8px; box-sizing: border-box; font-weight: bold;
        }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button {
            border: 3px solid #000; padding: 10px; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: transform 0.1s;
        }
        button:active { transform: translateY(3px); }
        .lock-btn { background: var(--ej-red); color: white; }
        .unlock-btn { background: var(--ej-green); color: white; }
        .debug-btn { background: #f5c542; grid-column: span 2; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="card-tab">ADMIN PANEL</div>
    <h2>Command Center</h2>

    <div class="input-group">
        <label>TARGET BUTTON ID</label>
        <input type="text" id="targetId" placeholder="e.g. multiplayerButton">
    </div>

    <div class="input-group">
        <label>TEXT OVERRIDE</label>
        <input type="text" id="targetText" placeholder="e.g. UPDATING...">
    </div>

    <div class="btn-grid">
        <button class="lock-btn" onclick="sendCmd(true)">LOCK</button>
        <button class="unlock-btn" onclick="sendCmd(false)">UNLOCK</button>
        <button class="debug-btn" onclick="sendDebug('888')">CODE 888: MAINTENANCE</button>
        <button class="debug-btn" onclick="sendDebug('999')">CODE 999: FORCE REFRESH</button>
    </div>
</div>

<script src="https://jsdelivr.net"></script>
<script>
    const supabase = window.supabase.createClient(
         "https://imhorwdmvhguvsayleqr.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltaG9yd2RtdmhndXZzYXlsZXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTQ4MjMsImV4cCI6MjA5MzIzMDgyM30.r0rKsHkIAQ8GrUPCY0rYS1z-8rT7fTGDRJfWU6RSNWM"
    );
    const channel = supabase.channel('admin_control').subscribe();

    function sendCmd(isLocked) {
        channel.send({
            type: 'broadcast',
            event: 'remote_lock',
            payload: { 
                id: document.getElementById('targetId').value, 
                locked: isLocked, 
                text: document.getElementById('targetText').value 
            }
        });
    }

    function sendDebug(code) {
        channel.send({
            type: 'broadcast',
            event: 'remote_debug',
            payload: { code }
        });
    }
</script>
</body>
</html>
